# PiFridge nginx configuration
# ----------------------------------------------------------------------------
# SETUP INSTRUCTIONS
# 1. Copy to /etc/nginx/sites-available/pifridge
#      sudo cp config/pifridge.conf /etc/nginx/sites-available/pifridge
#
# 2. Update the `root` path below to match where you cloned the repo
#
# 3. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/pifridge /etc/nginx/sites-enabled/
#
# 4. Test and reload:
#      sudo nginx -t
#      sudo systemctl reload nginx
# ----------------------------------------------------------------------------
 
server {
    listen 80;
    server_name localhost;
 
    root /home/pifridge/PIFRIDGE/src/web_app;
    index index.html;
 
    location / {
        try_files $uri $uri/ =404;
    }
 
    # FastCGI endpoint — proxies /api/fridge to the C++ FastCGI program
    # The socket path must match the one your FastCGI program binds to
    location /api/fridge {
        include        fastcgi_params;
        fastcgi_pass   unix:/tmp/pifridge_socket;
    }
}