# PiFridge nginx configuration
# ----------------------------------------------------------------------------
# SETUP INSTRUCTIONS
# 1. Copy to /etc/nginx/sites-available/pifridge
#      sudo cp config/pifridge.conf /etc/nginx/sites-available/pifridge
#
# 2. Update the `root` path below to match where you cloned the repo
#
# 3. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/pifridge /etc/nginx/sites-enabled/
#
# 4. Test and reload:
#      sudo nginx -t
#      sudo systemctl reload nginx
# ----------------------------------------------------------------------------
 
server {
    listen 80;
    server_name localhost;
 
    root /var/www/pifridge;
    index index.html;
 
    location / {
        try_files $uri $uri/ =404;
    }

    # Fridge vitals — GET /api/fridge
    location /api/fridge {
        include        fastcgi_params;
        fastcgi_pass   unix:/var/run/pifridge/pifridge.sock;
    }
 
    # Inventory delete — must be listed before /api/inventory so nginx matches it first
    location /api/inventory/delete {
        include        fastcgi_params;
        fastcgi_pass   unix:/var/run/pifridge/pifridge_inventory.sock;
    }
 
    # Inventory — GET (list items) and POST (add item)
    location /api/inventory {
        include        fastcgi_params;
        fastcgi_pass   unix:/var/run/pifridge/pifridge_inventory.sock;
    }

    location /api/inventory/decrement {
        include        fastcgi_params;
        fastcgi_pass   unix:/var/run/pifridge/pifridge_inventory.sock;
    }

    location /api/inventory/increment {
        include        fastcgi_params;
        fastcgi_pass   unix:/var/run/pifridge/pifridge_inventory.sock;
    }
}