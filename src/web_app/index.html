<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiFridge</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #eef3f7;
            --panel:      #ffffff;
            --border:     #dce4ed;
            --text:       #1a2332;
            --muted:      #7a8fa6;
            --accent:     #3b82f6;
            --open:       #ef4444;
            --closed:     #22c55e;
            --cold:       #bfdbfe;
            --shelf:      #d4e0ec;
            --radius:     16px;
            --mono:       'DM Mono', monospace;
            --sans:       'DM Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sans);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 40px;
            background: linear-gradient(160deg, #ddeeff 0%, #eef3f7 40%, #f0f4f8 100%);
        }

        header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeDown 0.5s ease both;
        }

        header h1 {
            font-family: var(--mono);
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text);
        }

        header p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: 0 2px 12px rgba(59,130,246,0.06);
            animation: fadeUp 0.4s ease both;
        }

        .card:nth-child(2) { animation-delay: 0.05s; }
        .card:nth-child(3) { animation-delay: 0.10s; }
        .card:nth-child(4) { animation-delay: 0.15s; }
        .card:nth-child(5) { animation-delay: 0.20s; }

        .card-label {
            font-family: var(--mono);
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        /* Door */
        .door-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .door-state {
            font-family: var(--mono);
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: 500;
            transition: color 0.4s ease;
        }

        .door-state.open   { color: var(--open); }
        .door-state.closed { color: var(--closed); }

        .door-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--closed);
            transition: background 0.4s ease;
            box-shadow: 0 0 0 4px rgba(34,197,94,0.15);
            flex-shrink: 0;
        }

        .door-indicator.open {
            background: var(--open);
            box-shadow: 0 0 0 4px rgba(239,68,68,0.15);
        }

        .door-lux {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 5px;
        }

        /* Vitals */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .vital-item {
            background: linear-gradient(135deg, #f0f7ff, #e8f2fc);
            border: 1px solid var(--cold);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .vital-value {
            font-family: var(--mono);
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 500;
            color: var(--text);
            line-height: 1;
        }

        .vital-unit {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .vital-label {
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 5px;
            letter-spacing: 0.04em;
        }

        /* Add form */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .add-form-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .add-form input {
            flex: 1;
            min-width: 80px;
            font-family: var(--sans);
            font-size: 0.85rem;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .add-form input:focus { border-color: var(--accent); }

        /* Red border when required field is empty and user tried to submit */
        .add-form input.invalid { border-color: var(--open); }

        .add-form input[type="number"] {
            width: 60px;
            flex: none;
        }

        .btn-add {
            font-family: var(--mono);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            padding: 8px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-add:hover  { opacity: 0.88; }
        .btn-add:active { transform: scale(0.97); }

        .add-status {
            font-size: 0.75rem;
            color: var(--muted);
            min-height: 1em;
            font-family: var(--mono);
        }

        .add-status.error { color: var(--open); }

        /* Inventory list */
        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .inventory-empty {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            padding: 20px 0;
            font-family: var(--mono);
        }

        .inventory-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, #f5f9ff, #eef3f7);
            border: 1px solid var(--shelf);
            border-radius: 10px;
            padding: 10px 12px;
            gap: 8px;
            animation: fadeUp 0.25s ease both;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .item-name {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .item-qty {
            font-family: var(--mono);
            font-size: 0.82rem;
            color: var(--accent);
            background: #eff6ff;
            border: 1px solid var(--cold);
            border-radius: 6px;
            padding: 2px 7px;
            min-width: 32px;
            text-align: center;
        }

        /* +/- buttons */
        .btn-qty {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--muted);
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }

        .btn-qty.minus:hover { color: var(--open);   border-color: var(--open); }
        .btn-qty.plus:hover  { color: var(--closed); border-color: var(--closed); }

        /* Footer */
        .footer-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .conn-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--closed);
            margin-right: 6px;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .conn-dot.error { background: var(--open); }

        .conn-text, .last-updated {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 400px) {
            body  { padding: 16px 10px 32px; }
            .card { padding: 14px 14px; }
            .add-form input  { font-size: 0.8rem; padding: 7px 8px; }
            .vital-value     { font-size: 1rem; }
            .item-name       { font-size: 0.82rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>PiFridge</h1>
        <p>Smart Fridge Monitor</p>
    </header>

    <div class="container">

        <!-- Door Status -->
        <div class="card" style="animation-delay:0s">
            <div class="card-label">Door</div>
            <div class="door-card">
                <div>
                    <div class="door-state closed" id="door-state">Closed</div>
                    <div class="door-lux">Lux: <span id="lux">--</span></div>
                </div>
                <div class="door-indicator" id="door-indicator"></div>
            </div>
        </div>

        <!-- Vitals -->
        <div class="card">
            <div class="card-label">Vitals</div>
            <div class="vitals-grid">
                <div class="vital-item">
                    <div class="vital-value" id="temperature">--</div>
                    <div class="vital-unit">&deg;C</div>
                    <div class="vital-label">Temp</div>
                </div>
                <div class="vital-item">
                    <div class="vital-value" id="humidity">--</div>
                    <div class="vital-unit">%</div>
                    <div class="vital-label">Humidity</div>
                </div>
                <div class="vital-item">
                    <div class="vital-value" id="pressure">--</div>
                    <div class="vital-unit">hPa</div>
                    <div class="vital-label">Pressure</div>
                </div>
            </div>
        </div>

        <!-- Inventory -->
        <div class="card">
            <div class="card-label">Fridge Contents</div>

            <div class="add-form">
                <div class="add-form-row">
                    <!-- required field — highlighted red if empty on submit -->
                    <input type="text"   id="input-name"     placeholder="Item name *">
                    <input type="text"   id="input-barcode"  placeholder="Barcode">
                    <input type="number" id="input-quantity" value="1" min="1">
                    <button class="btn-add" onclick="addItem()">Add</button>
                </div>
                <div class="add-status" id="add-status"></div>
            </div>

            <div class="inventory-list" id="inventory-list">
                <div class="inventory-empty">Loading...</div>
            </div>
        </div>

        <!-- Footer / Connection -->
        <div class="card footer-card">
            <div class="conn-text">
                <span class="conn-dot" id="conn-dot"></span>
                <span id="connection-status">Connecting...</span>
            </div>
            <div class="last-updated">Updated: <span id="last-updated">--</span></div>
        </div>

    </div>

    <script>
        const VITALS_URL    = "/api/fridge";
        const INVENTORY_URL = "/api/inventory";
        const POLL_INTERVAL = 1000;

        // ---------------------------------------------------------------------------
        // Vitals
        // ---------------------------------------------------------------------------
        function renderVitals(data) {
            document.getElementById("temperature").textContent = data.temperature.toFixed(1);
            document.getElementById("humidity").textContent    = data.humidity.toFixed(1);
            document.getElementById("pressure").textContent    = data.pressure.toFixed(0);
            document.getElementById("lux").textContent         = data.lux.toFixed(1);

            var doorEl = document.getElementById("door-state");
            var dotEl  = document.getElementById("door-indicator");
            var isOpen = data.door_open;

            doorEl.textContent = isOpen ? "Open" : "Closed";
            doorEl.className   = "door-state " + (isOpen ? "open" : "closed");
            dotEl.className    = "door-indicator" + (isOpen ? " open" : "");

            document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();
            document.getElementById("conn-dot").className       = "conn-dot";
            document.getElementById("connection-status").textContent = "Connected";
        }

        function pollVitals() {
            fetch(VITALS_URL)
                .then(function(r) {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.json();
                })
                .then(renderVitals)
                .catch(function(err) {
                    document.getElementById("conn-dot").className = "conn-dot error";
                    document.getElementById("connection-status").textContent = "Error: " + err.message;
                });
        }

        // ---------------------------------------------------------------------------
        // Inventory
        // ---------------------------------------------------------------------------
        var lastInventoryJSON = "";

        function renderInventory(items) {
            var newJSON = JSON.stringify(items);
            if (newJSON === lastInventoryJSON) return;
            lastInventoryJSON = newJSON;

            var list = document.getElementById("inventory-list");
            list.innerHTML = "";

            if (!items || items.length === 0) {
                list.innerHTML = "<div class='inventory-empty'>Nothing in the fridge yet.</div>";
                return;
            }

            items.forEach(function(item) {
                var el = document.createElement("div");
                el.className = "inventory-item";
                el.innerHTML =
                    "<div class='item-info'>" +
                        "<div class='item-name'>" + item.name + "</div>" +
                        "<div class='item-meta'>" +
                            (item.barcode ? item.barcode + " &middot; " : "") +
                            "Added " + item.date_added +
                        "</div>" +
                    "</div>" +
                    "<div class='item-right'>" +
                        "<button class='btn-qty minus' onclick='decrementItem(" + item.id + ")'>&#8722;</button>" +
                        "<span class='item-qty'>x" + item.quantity + "</span>" +
                        "<button class='btn-qty plus'  onclick='incrementItem(" + item.id + ")'>&#43;</button>" +
                    "</div>";
                list.appendChild(el);
            });
        }

        function fetchInventory() {
            fetch(INVENTORY_URL)
                .then(function(r) {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.json();
                })
                .then(renderInventory)
                .catch(function(err) {
                    document.getElementById("inventory-list").innerHTML =
                        "<div class='inventory-empty'>Error: " + err.message + "</div>";
                });
        }

        // ---------------------------------------------------------------------------
        // Add item — name is required
        // ---------------------------------------------------------------------------
        function addItem() {
            var nameInput = document.getElementById("input-name");
            var name      = nameInput.value.trim();
            var barcode   = document.getElementById("input-barcode").value.trim();
            var quantity  = parseInt(document.getElementById("input-quantity").value) || 1;
            var status    = document.getElementById("add-status");

            // Highlight the name field red and show error if empty
            if (!name) {
                nameInput.classList.add("invalid");
                status.textContent = "Item name is required.";
                status.className   = "add-status error";
                nameInput.focus();
                return;
            }

            nameInput.classList.remove("invalid");
            status.textContent = "";
            status.className   = "add-status";

            fetch(INVENTORY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, barcode: barcode, quantity: quantity })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    status.textContent = "Added!";
                    status.className   = "add-status";
                    nameInput.value    = "";
                    document.getElementById("input-barcode").value  = "";
                    document.getElementById("input-quantity").value = 1;
                    setTimeout(function() { status.textContent = ""; }, 2000);
                    fetchInventory();
                } else {
                    status.textContent = "Error: " + (data.error || "unknown");
                    status.className   = "add-status error";
                }
            })
            .catch(function(err) {
                status.textContent = "Error: " + err.message;
                status.className   = "add-status error";
            });
        }

        // Clear invalid state as soon as the user starts typing
        document.getElementById("input-name").addEventListener("input", function() {
            this.classList.remove("invalid");
            var status = document.getElementById("add-status");
            status.textContent = "";
            status.className   = "add-status";
        });

        // ---------------------------------------------------------------------------
        // Decrement — removes row when quantity hits 0
        // ---------------------------------------------------------------------------
        function decrementItem(id) {
            fetch(INVENTORY_URL + "/decrement", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) { if (data.success) fetchInventory(); })
            .catch(function(err) { console.error("Decrement error:", err); });
        }

        // ---------------------------------------------------------------------------
        // Increment — adds 1 to quantity
        // ---------------------------------------------------------------------------
        function incrementItem(id) {
            fetch(INVENTORY_URL + "/increment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) { if (data.success) fetchInventory(); })
            .catch(function(err) { console.error("Increment error:", err); });
        }

        // ---------------------------------------------------------------------------
        // Start
        // ---------------------------------------------------------------------------
        window.addEventListener("load", function() {
            pollVitals();
            setInterval(pollVitals, POLL_INTERVAL);
            fetchInventory();
            setInterval(fetchInventory, 2000);
        });
    </script>

</body>
</html>
